services:
  postgres:
    image: postgres:17
    container_name: goflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: goflow
      POSTGRES_PASSWORD: goflow
      POSTGRES_USER: goflow
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
  
  redis:
    image: redis:8
    container_name: goflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
